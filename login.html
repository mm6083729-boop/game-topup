<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول الإدارة</title>
<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Tahoma,sans-serif;
    background:#111;
    color:#fff;
}

.login-box{
    width:90%;
    max-width:400px;
    margin:100px auto;
    background:#1f1f1f;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(255,204,0,.3);
}

.login-box h2{
    text-align:center;
    color:#ffcc00;
    margin-bottom:25px;
}

.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

.login-box button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#ffcc00;
    color:#000;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.login-box button:hover{
    background:#e6b800;
}
</style>

</head>
<body>

<div class="login-box">

<h2>تسجيل دخول الإدارة</h2>

<form action="login.php" method="POST">

<input
type="text"
name="username"
placeholder="اسم المستخدم"
required>

<input
type="password"
name="password"
placeholder="كلمة المرور"
required>

<button type="submit">
دخول
</button>

</form>

</div>

</body>
</html>
